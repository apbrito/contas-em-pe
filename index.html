<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contas Em Pé — jogo de soma com transporte para crianças (2.º ano)">
  <title>🦉 Contas Em Pé</title>

  <!-- PWA: manifesto + ícones + theme color para o Chrome Android -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#2a3e5c">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- React 18 -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <!-- Babel para JSX inline -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind utility CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonte manuscrita -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Lógica pura -->
  <script src="logic.js"></script>

  <style>
    :root {
      --paper-bg: #fdf6e3;
      --paper-grid: #e8dfb0;
      --ink-primary: #2a3e5c;
      --ink-secondary: #5c4a2a;
      --success: #7fb069;
      --hint: #e8a05c;
      --error: #c47474;
      --magic-gold: #d4a017;
      /* Banca da feira (F2-F5) */
      --paper-bg-warm: #fdf0d5;
      --paper-cream: #fffbef;
      --burgundy: #800020;
      --bronze: #b8860b;
      --gold-bright: #d4a017;
      --ink-warm: #5e4017;
      --sage: #87a96b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      color: var(--ink-primary);
      background-color: var(--paper-bg);
      background-image:
        linear-gradient(var(--paper-grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--paper-grid) 1px, transparent 1px);
      background-size: 24px 24px;
      min-height: 100vh;
      overscroll-behavior: none;
    }

    .handwritten {
      font-family: 'Caveat', 'Bradley Hand', 'Comic Sans MS', cursive;
      font-weight: 700;
    }

    /* Animações base */
    @keyframes pencil-stroke {
      from { opacity: 0; transform: translateY(-3px) scale(0.85); }
      60%  { opacity: 1; }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .anim-pencil { animation: pencil-stroke 0.35s ease-out both; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      50% { transform: translateX(4px); }
      75% { transform: translateX(-3px); }
    }
    .anim-shake { animation: shake 0.3s ease-in-out; }

    @keyframes pulse-soft {
      0%, 100% { box-shadow: 0 0 0 0 rgba(42, 62, 92, 0.4); }
      50% { box-shadow: 0 0 0 6px rgba(42, 62, 92, 0); }
    }
    .anim-pulse { animation: pulse-soft 1.4s ease-out infinite; }

    @keyframes star-pop {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.3); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .anim-star { animation: star-pop 0.4s ease-out forwards; }

    @keyframes fly-arc {
      0% { transform: translate(0, 0) scale(0.6); opacity: 0; }
      30% { opacity: 1; }
      100% { transform: var(--fly-end, translate(60px, -60px)) scale(1); opacity: 1; }
    }
    .anim-fly-arc { animation: fly-arc 0.6s ease-out forwards; }

    /* Transporte voador: result correct → carry slot da coluna seguinte
       (que está acima e à esquerda em colsRender). */
    @keyframes fly-carry-up-left {
      0%   { transform: translate(0, 0) scale(0.7); opacity: 0; }
      20%  { transform: translate(-12px, -20px) scale(1.1); opacity: 1; }
      60%  { transform: translate(-50px, -110px) scale(1.05); opacity: 1; }
      100% { transform: translate(-72px, -150px) scale(0.9); opacity: 0; }
    }
    .anim-fly-carry { animation: fly-carry-up-left 0.85s ease-out forwards; pointer-events: none; }

    @keyframes confetti-fall {
      0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(400px) rotate(720deg); opacity: 0; }
    }

    @keyframes owl-blink {
      0%, 90%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.1); }
    }
    .owl-idle { animation: owl-blink 6s infinite; }

    @keyframes owl-hop {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .owl-happy { animation: owl-hop 0.5s ease-in-out 2; }

    @keyframes points-pop {
      0%   { transform: translateY(0) scale(0.6); opacity: 0; }
      20%  { transform: translateY(-6px) scale(1.1); opacity: 1; }
      100% { transform: translateY(-44px) scale(1); opacity: 0; }
    }
    .anim-points-pop { animation: points-pop 0.9s ease-out forwards; }

    @keyframes points-bump {
      0%, 100% { transform: scale(1); }
      40%      { transform: scale(1.18); }
    }
    .anim-points-bump { animation: points-bump 0.35s ease-out; }

    /* "Manuscrito" — bordas e sombras */
    .paper-card {
      background: #fffef5;
      border: 2px solid var(--ink-secondary);
      border-radius: 14px 8px 12px 10px;
      box-shadow: 1px 2px 0 rgba(0, 0, 0, 0.08);
    }

    .paper-button {
      background: #fffef5;
      border: 2px solid var(--ink-secondary);
      border-radius: 10px 14px 8px 12px;
      transition: transform 0.1s, box-shadow 0.1s;
      cursor: pointer;
      font-family: 'Caveat', cursive;
      font-weight: 700;
      box-shadow: 1px 2px 0 rgba(0, 0, 0, 0.08);
    }
    .paper-button:hover { transform: translateY(-1px); box-shadow: 2px 3px 0 rgba(0, 0, 0, 0.12); }
    .paper-button:active { transform: translateY(1px); box-shadow: 0 1px 0 rgba(0, 0, 0, 0.08); }
    .paper-button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    /* Slot states */
    .slot-empty {
      border: 2px dashed var(--ink-secondary);
      background: rgba(255, 255, 240, 0.5);
      color: var(--ink-secondary);
    }
    .slot-active {
      border: 2px solid var(--ink-primary);
      background: #fffef5;
    }
    .slot-correct {
      border: 2px solid var(--success);
      background: #eaf5e1;
      color: #2c5012;
    }
    .slot-wrong {
      border: 2px solid var(--error);
      background: #fadcdc;
      color: var(--error);
    }
    .slot-revealed {
      border: 2px solid var(--hint);
      background: #fff0db;
      color: var(--hint);
    }

    /* Wrapper que dá hit area táctil generosa (56px na largura, onde o dedo
       aterra) ao slot circular pequeno, sem lhe agigantar o visual nem
       desperdiçar espaço vertical na linha dos transportes. */
    .slot-hit-area {
      width: 56px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* Tabela: barras verticais entre colunas, com aspecto manuscrito.
       Apenas as barras interiores — sem moldura exterior. */
    .table-grid {
      position: relative;
    }
    .col-divider {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 0;
      border-left: 2px solid var(--ink-secondary);
      opacity: 0.32;
      pointer-events: none;
    }
    .col-divider.tilt-a { transform: translateX(-1px) rotate(0.6deg); }
    .col-divider.tilt-b { transform: translateX(-1px) rotate(-0.5deg); }
    .col-divider.tilt-c { transform: translateX(-1px) rotate(0.35deg); }

    /* Barras horizontais manuscritas, equivalentes às .col-divider verticais.
       Substituem os <hr> "duros" por algo mais coerente com o caderno. */
    .row-divider {
      height: 0;
      border-top: 2px solid var(--ink-secondary);
      opacity: 0.42;
      margin: 8px 0;
      transform: rotate(-0.3deg);
    }
    .row-divider-double {
      height: 5px;
      border-top: 2px solid var(--ink-primary);
      border-bottom: 2px solid var(--ink-primary);
      opacity: 0.55;
      margin: 8px 0;
      transform: rotate(0.35deg);
    }
    /* Variante mais subtil para separar parcelas entre si — ainda menos
       peso para não saturar a tabela. */
    .row-divider-soft {
      height: 0;
      border-top: 1.5px solid var(--ink-secondary);
      opacity: 0.28;
      margin: 4px 0;
      transform: rotate(-0.2deg);
    }
    .row-divider-soft.tilt-h-b { transform: rotate(0.25deg); }

    .update-banner {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--paper-bg, #fdf6e3);
      border: 2px solid var(--magic-gold, #d4a017);
      border-radius: 12px;
      padding: 14px 18px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.18);
      display: flex;
      align-items: center;
      gap: 16px;
      font-family: 'Caveat', cursive;
      font-size: 18px;
      color: var(--ink-primary, #5a3a18);
      z-index: 1000;
      max-width: 90vw;
    }
    .update-banner button {
      background: var(--magic-gold, #d4a017);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-family: 'Caveat', cursive;
      font-size: 22px;
      cursor: pointer;
      min-height: 56px;
    }
    .update-banner button:active { transform: translateY(1px); }

    .pc-shell {
      background: var(--paper-bg-warm);
      padding: clamp(20px, 2.4vw, 36px) clamp(24px, 2.8vw, 44px);
      border-radius: 14px;
      max-width: min(880px, 92vw);
      margin: 0 auto;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
      position: relative;
    }
    .pc-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: clamp(14px, 1.8vw, 26px); margin-top: clamp(14px, 1.8vw, 24px); }
    @media (max-width: 600px) { .pc-grid { grid-template-columns: 1fr; } }
    .pc-form { background: var(--paper-cream); border: 2px solid var(--bronze); border-radius: 12px; padding: clamp(14px, 1.8vw, 24px); box-shadow: 2px 3px 0 rgba(0,0,0,0.10); }
    .pc-label { font-family: 'Caveat', cursive; font-size: clamp(20px, 2.2vw, 30px); font-weight: 600; color: var(--ink-warm); margin-bottom: 4px; }
    .pc-help { font-size: clamp(11px, 1.2vw, 16px); color: #888; margin-bottom: 6px; }
    .pc-help.error { color: #b00020; }
    .pc-input { background: transparent; border: none; border-bottom: 2px dashed var(--bronze); font-family: 'Caveat', cursive; font-size: clamp(28px, 3vw, 42px); color: var(--ink-warm); width: 100%; padding: 4px 0; outline: none; }
    .pc-ava-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: clamp(6px, 0.8vw, 12px); margin-top: clamp(10px, 1.2vw, 16px); }
    .pc-ava { background: var(--paper-bg-warm); border: 2px solid transparent; border-radius: 12px; padding: 8px; text-align: center; font-size: clamp(28px, 3vw, 44px); cursor: pointer; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; min-height: 56px; }
    .pc-ava.selected { border-color: var(--burgundy); background: #fff5ec; box-shadow: 0 0 0 3px rgba(128,0,32,0.10); transform: scale(1.05); }
    .pc-preview-sign { background: repeating-linear-gradient(45deg, transparent 0 6px, rgba(184,134,11,0.06) 6px 7px), var(--paper-cream); border: 3px solid var(--bronze); border-radius: 14px; padding: clamp(18px, 2.2vw, 28px) clamp(14px, 1.8vw, 24px); text-align: center; box-shadow: 4px 6px 0 rgba(0,0,0,0.12); transform: rotate(-2deg); margin: 14px; }
    .pc-preview-ava { font-size: clamp(56px, 6vw, 96px); line-height: 1; }
    .pc-preview-name { font-family: 'Caveat', cursive; font-size: clamp(26px, 2.8vw, 40px); font-weight: 600; color: var(--ink-warm); margin-top: 4px; }
    .pc-preview-badge { display: inline-block; background: var(--gold-bright); color: var(--paper-cream); font-family: 'Caveat', cursive; font-size: clamp(14px, 1.5vw, 20px); padding: 1px 10px; border-radius: 6px; margin-top: 6px; }
    .pc-btn-row { display: flex; gap: clamp(10px, 1.2vw, 16px); justify-content: center; margin-top: clamp(14px, 1.8vw, 22px); }
    .pc-btn { font-family: 'Caveat', cursive; font-size: clamp(18px, 1.9vw, 26px); font-weight: 600; background: var(--burgundy); color: var(--paper-cream); border: 2px solid var(--burgundy); padding: clamp(12px, 1.4vw, 18px) clamp(22px, 2.4vw, 32px); border-radius: 10px; box-shadow: 2px 3px 0 rgba(128,0,32,0.18); cursor: pointer; min-height: 56px; }
    .pc-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .pc-btn.ghost { background: var(--paper-cream); color: var(--ink-warm); border-color: var(--bronze); box-shadow: 2px 3px 0 rgba(184,134,11,0.18); }

    .mm-shell {
      background: radial-gradient(ellipse at 80% 18%, rgba(255,222,160,0.45) 0%, transparent 60%), radial-gradient(ellipse at 12% 82%, rgba(128,0,32,0.10) 0%, transparent 55%), var(--paper-bg-warm);
      padding: clamp(20px, 2.4vw, 36px) clamp(24px, 2.8vw, 44px); border-radius: 14px;
      max-width: min(880px, 92vw); margin: 0 auto;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08); position: relative;
    }
    .mm-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: clamp(16px, 2vw, 28px); gap: clamp(12px, 1.5vw, 20px); }
    .mm-greet { font-family: 'Caveat', cursive; font-size: clamp(28px, 3.6vw, 48px); font-weight: 600; color: var(--ink-warm); line-height: 1; }
    .mm-greet .small { font-size: clamp(13px, 1.5vw, 20px); font-weight: 400; color: var(--burgundy); display: block; margin-top: 2px; }
    .mm-greet a { color: var(--gold-bright); cursor: pointer; text-decoration: underline; margin-left: 4px; }
    .mm-points { font-family: 'Caveat', cursive; font-size: clamp(22px, 2.4vw, 34px); font-weight: 600; color: var(--gold-bright); white-space: nowrap; }
    .mm-card { background: var(--paper-cream); border: 2px solid var(--bronze); border-radius: 14px; padding: clamp(14px, 1.6vw, 22px); box-shadow: 2px 3px 0 rgba(0,0,0,0.10); }
    .mm-card-title { font-family: 'Caveat', cursive; font-size: clamp(26px, 2.8vw, 42px); font-weight: 600; color: var(--ink-warm); margin-bottom: clamp(10px, 1.2vw, 16px); display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
    .mm-card-title .level { font-family: 'Caveat', cursive; font-weight: 400; font-size: clamp(14px, 1.5vw, 20px); color: #888; }
    .mm-card-modes { display: flex; gap: clamp(10px, 1.2vw, 16px); }
    .mm-mode { flex: 1; background: var(--paper-bg-warm); border: 2px solid var(--gold-bright); border-radius: 10px; padding: clamp(14px, 2vw, 24px) clamp(12px, 1.6vw, 20px); text-align: center; cursor: pointer; min-height: 56px; }
    .mm-mode.tempo { border-color: var(--burgundy); }
    .mm-mode .ico { font-size: clamp(32px, 3.6vw, 56px); line-height: 1; }
    .mm-mode .lbl { font-family: 'Caveat', cursive; font-size: clamp(20px, 2.2vw, 32px); font-weight: 600; color: var(--ink-warm); margin-top: 4px; }
    .mm-mode .meta { font-size: clamp(12px, 1.4vw, 18px); color: #888; margin-top: 2px; }
    .mm-ghost-btn { background: transparent; border: 1.5px solid var(--bronze); color: var(--ink-warm); padding: clamp(10px, 1.2vw, 16px) clamp(18px, 2vw, 28px); border-radius: 8px; font-family: 'Caveat', cursive; font-size: clamp(18px, 1.9vw, 26px); font-weight: 600; cursor: pointer; margin: clamp(12px, 1.6vw, 20px) auto 0; display: block; min-height: 48px; }
    .mm-gear { background: transparent; border: none; cursor: pointer; font-size: clamp(24px, 2.4vw, 34px); padding: clamp(4px, 0.6vw, 8px) clamp(8px, 0.9vw, 12px); min-height: 44px; }
    .ta-shell { max-width: min(1080px, 96vw); margin: 0 auto; padding: clamp(12px, 1.6vw, 22px); }
    .ta-header { display: flex; justify-content: space-between; align-items: center; padding: clamp(8px, 1vw, 14px) clamp(14px, 1.6vw, 22px); background: var(--paper-cream); border: 2px solid var(--bronze); border-radius: 12px; margin-bottom: clamp(12px, 1.4vw, 20px); gap: clamp(12px, 1.4vw, 20px); flex-wrap: wrap; }
    .ta-header .left { display: flex; gap: clamp(12px, 1.4vw, 22px); align-items: baseline; flex-wrap: wrap; }
    .ta-name { font-family: 'Caveat', cursive; font-size: clamp(20px, 2.2vw, 30px); font-weight: 600; color: var(--ink-warm); }
    .ta-level { font-family: 'Caveat', cursive; font-size: clamp(18px, 2vw, 26px); color: var(--burgundy); }
    .ta-points { font-family: 'Caveat', cursive; font-size: clamp(22px, 2.4vw, 34px); font-weight: 600; color: var(--gold-bright); }
    .ta-time { font-family: 'Caveat', cursive; font-size: clamp(36px, 4.5vw, 64px); font-weight: 700; color: var(--burgundy); line-height: 1; min-width: clamp(100px, 10vw, 150px); text-align: right; }
    .ta-time.warn { color: #c84020; }
    .ta-time.crit { color: #b00020; animation: pulse-soft 1s infinite; }
    /* TimeAttackLobby cards */
    .ta-lobby-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(clamp(150px, 16vw, 200px), 1fr)); gap: clamp(10px, 1.2vw, 16px); }
    .ta-lobby-card { background: repeating-linear-gradient(45deg, transparent 0 6px, rgba(184,134,11,0.05) 6px 7px), var(--paper-cream); border: 2px solid var(--bronze); border-radius: 12px; padding: clamp(10px, 1.2vw, 16px) clamp(6px, 0.8vw, 12px); text-align: center; box-shadow: 2px 3px 0 rgba(0,0,0,0.10); cursor: pointer; min-height: clamp(110px, 12vw, 150px); }
    .ta-lobby-card.alt { transform: rotate(1deg); }
    .ta-lobby-card:not(.alt) { transform: rotate(-1deg); }
    .ta-lobby-avatar { font-size: clamp(32px, 3.6vw, 54px); line-height: 1; }
    .ta-lobby-name { font-family: 'Caveat', cursive; font-size: clamp(20px, 2.2vw, 30px); font-weight: 600; color: var(--ink-warm); margin-top: 2px; }
    .ta-lobby-best { font-size: clamp(11px, 1.2vw, 16px); color: var(--burgundy); margin-top: 2px; }
    .ta-lobby-new { background: transparent; border: 2px dashed var(--bronze); border-radius: 12px; padding: clamp(10px, 1.2vw, 16px) clamp(6px, 0.8vw, 12px); text-align: center; color: var(--bronze); cursor: pointer; font-family: 'Caveat', cursive; min-height: clamp(110px, 12vw, 150px); display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .ta-lobby-new .plus { font-size: clamp(32px, 3.6vw, 54px); line-height: 1; }
    .ta-lobby-new .lbl { font-size: clamp(18px, 2vw, 26px); font-weight: 600; }
    .ta-lobby-actions { display: flex; gap: clamp(10px, 1.2vw, 16px); justify-content: center; margin-top: clamp(18px, 2vw, 28px); flex-wrap: wrap; }
    .ta-lobby-btn { background: transparent; border: 1.5px solid var(--bronze); border-radius: 10px; padding: clamp(12px, 1.4vw, 18px) clamp(18px, 2vw, 28px); font-family: 'Caveat', cursive; font-size: clamp(18px, 1.9vw, 26px); font-weight: 600; cursor: pointer; color: var(--ink-warm); min-height: 56px; }
    .ta-lobby-btn.mural { background: var(--paper-cream); border: 2px solid var(--burgundy); color: var(--burgundy); box-shadow: 2px 3px 0 rgba(128,0,32,0.18); }

    /* EndScreen */
    .es-shell { max-width: min(1080px, 96vw); margin: 0 auto; padding: clamp(20px, 2.4vw, 36px) clamp(22px, 2.6vw, 40px) clamp(18px, 2vw, 30px); background: radial-gradient(ellipse at 50% 0%, rgba(212,160,23,0.30) 0%, transparent 60%), radial-gradient(ellipse at 30% 95%, rgba(128,0,32,0.10) 0%, transparent 55%), var(--paper-bg-warm); border-radius: 14px; position: relative; }
    .es-grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: clamp(14px, 1.8vw, 26px); align-items: center; }
    @media (max-width: 700px) { .es-grid { grid-template-columns: 1fr; } }
    .es-left { text-align: center; }
    .es-pts-big { font-family: 'Caveat', cursive; font-size: clamp(96px, 11vw, 160px); font-weight: 700; color: var(--burgundy); line-height: 0.95; letter-spacing: -2px; }
    .es-pts-big .star { color: var(--gold-bright); font-size: clamp(60px, 7vw, 100px); vertical-align: super; }
    .es-place-big { font-family: 'Caveat', cursive; font-size: clamp(32px, 3.6vw, 52px); font-weight: 600; color: var(--ink-warm); margin-top: 2px; }
    .es-msg-big { font-family: 'Caveat', cursive; font-size: clamp(22px, 2.4vw, 32px); font-weight: 600; color: var(--ink-warm); background: var(--paper-cream); border: 2px dashed var(--bronze); border-radius: 14px; padding: clamp(10px, 1.2vw, 16px) clamp(16px, 1.8vw, 24px); margin: clamp(10px, 1.2vw, 16px) auto 0; line-height: 1.2; transform: rotate(-1deg); box-shadow: 2px 3px 0 rgba(184,134,11,0.18); display: inline-block; max-width: 90%; }
    .es-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: clamp(8px, 1vw, 14px); margin-top: clamp(14px, 1.6vw, 22px); }

    .lb-shell { max-width: min(920px, 94vw); margin: 0 auto; padding: clamp(20px, 2.4vw, 36px) clamp(24px, 2.8vw, 44px) clamp(16px, 2vw, 26px); background: radial-gradient(ellipse at 50% 0%, rgba(212,160,23,0.18) 0%, transparent 60%), radial-gradient(ellipse at 12% 82%, rgba(128,0,32,0.10) 0%, transparent 55%), var(--paper-bg-warm); border-radius: 14px; position: relative; }

    .lb-ribbon::before, .lb-ribbon::after { content: ""; position: absolute; top: 0; bottom: 0; width: 8px; background: var(--gold-bright); }

    .lb-podium { display: grid; grid-template-columns: 1fr 1.15fr 1fr; gap: clamp(8px, 1vw, 14px); align-items: end; margin: clamp(12px, 1.4vw, 20px) 0; padding: 0 clamp(8px, 1vw, 14px); }

    .lb-row .nm { font-family: 'Caveat', cursive; font-size: clamp(16px, 1.8vw, 22px); font-weight: 600; }

    .lb-empty { text-align: center; padding: clamp(24px, 2.8vw, 40px); color: #888; font-family: 'Caveat', cursive; font-size: clamp(18px, 2vw, 26px); }
    .lb-btn-row { display: flex; gap: clamp(10px, 1.2vw, 16px); justify-content: center; margin-top: clamp(14px, 1.6vw, 22px); flex-wrap: wrap; }

</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useReducer, useCallback, useMemo } = React;

    const { LEVELS, generateExercise, validateSlot, loadState, saveState, resetState, computeColumnSums, computePointsForExercise } = window.ContasLogic;
    const { getActiveProfile, createProfile, setActiveProfile, listProfiles, getLeaderboard, MAX_PROFILES } = window.ContasLogic;

    function isCarryNeededForCol(expected, col) {
      return expected.carries[col] > 0;
    }

    function nextActiveSlotCol(activeSlot, expected, numCols) {
      const { type, col } = activeSlot;
      if (type === 'result') {
        if (col + 1 >= numCols) return null;
        if (isCarryNeededForCol(expected, col)) {
          return { type: 'carry', col: col + 1 };
        } else {
          return { type: 'result', col: col + 1 };
        }
      }
      if (type === 'carry') {
        return { type: 'result', col };
      }
      return null;
    }

    function buildHintForError(activeSlot, exercise, attempt) {
      const { type, col } = activeSlot;
      const { expected, parcelas } = exercise;
      if (attempt === 1) {
        return { kind: 'soft', text: 'Hmm, olha bem 🤔' };
      }
      if (type === 'carry') {
        if (expected.carries[col - 1] > 0) {
          return { kind: 'specific', text: `Esta coluna teve transporte da coluna anterior. Põe 1.` };
        } else {
          return { kind: 'specific', text: 'Esta coluna não chegou a 10 — não há transporte aqui.' };
        }
      }
      const carryFromPrev = col > 0 ? (expected.carries[col - 1] || 0) : 0;
      const colDigits = parcelas.map(p => Math.floor(p / Math.pow(10, col)) % 10);
      const carryStr = carryFromPrev > 0 ? ` + ${carryFromPrev}` : '';
      return {
        kind: 'specific',
        text: `Soma outra vez: ${colDigits.join(' + ')}${carryStr} dá quanto?`,
      };
    }

    function Mascot({ state = 'idle', size = 52, name = null, bubble = null, perched = false }) {
      const stateClass = `mascot-${state}`;
      const style = { fontSize: size, lineHeight: 1, filter: 'drop-shadow(0 4px 0 rgba(0,0,0,0.10))' };
      return (
        <span className={`mascot-wrap ${stateClass}`} style={{ position: 'relative', display: 'inline-block', textAlign: 'center' }}>
          <span style={style} role="img" aria-label={name || 'coruja'}>🦉</span>
          {perched && <div style={{ height: 4, width: Math.max(40, size * 0.8), background: 'var(--ink-warm)', borderRadius: 2, margin: '4px auto 0' }}></div>}
          {bubble && (
            <div style={{
              position: 'absolute', top: -54, right: -28,
              background: 'var(--paper-cream)', border: '2px solid var(--burgundy)', borderRadius: 14,
              padding: '6px 14px', fontFamily: 'Caveat, cursive', fontSize: 22,
              color: 'var(--burgundy)', transform: 'rotate(2deg)',
              boxShadow: '2px 3px 0 rgba(128,0,32,0.18)', whiteSpace: 'nowrap',
            }}>
              {bubble}
            </div>
          )}
        </span>
      );
    }

    function Mascote({ state }) {
      // state: 'idle' | 'happy' | 'thinking' | 'worried' | 'celebrating'

      const animClass = {
        idle: 'owl-idle',
        happy: 'owl-happy',
        thinking: '',
        worried: '',
        celebrating: 'owl-happy',
      }[state] || 'owl-idle';

      const tilt = {
        idle: 0,
        happy: 0,
        thinking: -10,
        worried: 8,
        celebrating: 0,
      }[state] || 0;

      return (
        <div className="relative inline-block" style={{ width: 80, height: 80 }}>
          <div
            className={animClass}
            style={{
              fontSize: 64,
              lineHeight: 1,
              transform: `rotate(${tilt}deg)`,
              transition: 'transform 0.3s ease-out',
              textAlign: 'center',
            }}
          >
            🦉
          </div>
          {state === 'celebrating' && (
            <>
              <span style={{ position: 'absolute', top: -8, left: -8, fontSize: 20, color: 'var(--magic-gold)' }} className="anim-star">⭐</span>
              <span style={{ position: 'absolute', top: -8, right: -8, fontSize: 20, color: 'var(--magic-gold)', animationDelay: '0.1s' }} className="anim-star">✨</span>
              <span style={{ position: 'absolute', bottom: -4, left: 50, fontSize: 16 }} className="anim-star">⭐</span>
            </>
          )}
          {state === 'happy' && (
            <span style={{ position: 'absolute', top: -8, right: -4, fontSize: 18 }} className="anim-star">⭐</span>
          )}
          {state === 'thinking' && (
            <span style={{ position: 'absolute', top: -10, right: -4, fontSize: 18, color: 'var(--ink-secondary)' }}>🤔</span>
          )}
        </div>
      );
    }

    function Header({ level, points, mascoteState, pointsBurst, onOpenParental }) {
      // points: contador acumulativo (nunca decresce). pointsBurst: número (ex. 10/5)
      // que aparece a flutuar quando um exercício é concluído; null = sem burst activo.
      const counterClass = `handwritten ${pointsBurst != null ? 'anim-points-bump' : ''}`;
      return (
        <header className="w-full max-w-3xl flex items-center justify-between px-4 py-3 mb-4">
          <div className="flex items-center gap-3">
            <Mascote state={mascoteState} />
            <div>
              <h1 className="handwritten text-3xl md:text-4xl m-0" style={{ color: 'var(--ink-primary)' }}>
                Contas Em Pé
              </h1>
              <p className="text-sm m-0" style={{ color: 'var(--ink-secondary)' }}>
                Nível <strong>{level}</strong> / 12
              </p>
            </div>
          </div>

          <div className="flex items-center gap-4">
            <div
              className="relative flex items-baseline gap-1"
              role="status"
              aria-label={`${points} pontos`}
            >
              <span
                key={`pts-${points}`}
                className={counterClass}
                style={{ fontSize: 36, color: 'var(--magic-gold)', lineHeight: 1 }}
              >
                {points}
              </span>
              <span className="handwritten" style={{ fontSize: 18, color: 'var(--ink-secondary)' }}>pts</span>
              {pointsBurst != null && (
                <span
                  key={`burst-${pointsBurst}-${points}`}
                  className="handwritten anim-points-pop"
                  style={{
                    position: 'absolute',
                    right: -4,
                    top: -8,
                    fontSize: 22,
                    color: 'var(--success)',
                    pointerEvents: 'none',
                    whiteSpace: 'nowrap',
                  }}
                >
                  +{pointsBurst}
                </span>
              )}
            </div>
            <button
              onClick={onOpenParental}
              aria-label="Definições"
              className="paper-button px-3 py-2 text-2xl"
              style={{ borderRadius: 50 }}
            >
              ⚙
            </button>
          </div>
        </header>
      );
    }

    function Numpad({ onPress, disabled }) {
      const keys = [
        { label: '1', value: 1 }, { label: '2', value: 2 }, { label: '3', value: 3 },
        { label: '4', value: 4 }, { label: '5', value: 5 }, { label: '6', value: 6 },
        { label: '7', value: 7 }, { label: '8', value: 8 }, { label: '9', value: 9 },
        null, { label: '0', value: 0 }, { label: '⌫', value: 'erase' },
      ];

      const rotations = ['-1deg', '0.5deg', '-0.5deg', '0.8deg', '-0.8deg', '0.3deg', '-0.3deg', '0.6deg', '-0.6deg', '0deg', '-0.4deg', '0.4deg'];

      return (
        <div
          className="paper-card p-4 grid grid-cols-3 gap-3"
          style={{ width: 'fit-content', margin: '0 auto', background: 'var(--paper-bg)' }}
        >
          {keys.map((k, i) => {
            if (!k) return <div key={i} />;
            const isErase = k.value === 'erase';
            return (
              <button
                key={i}
                onClick={() => !disabled && onPress(k.value)}
                disabled={disabled}
                aria-label={isErase ? 'Apagar' : `Algarismo ${k.label}`}
                className="paper-button"
                style={{
                  width: 64,
                  height: 64,
                  fontSize: isErase ? 28 : 36,
                  transform: `rotate(${rotations[i]})`,
                  color: isErase ? 'var(--error)' : 'var(--ink-primary)',
                  background: isErase ? '#fadcdc' : '#fffef5',
                  borderColor: isErase ? 'var(--error)' : 'var(--ink-secondary)',
                }}
              >
                {k.label}
              </button>
            );
          })}
        </div>
      );
    }

    // Índice 0 = unidades. M = milhares, DM = dezenas de milhar, CM = centenas
    // de milhar. Cobre até 6 dígitos no resultado, suficiente para nível 12
    // (4 dígitos × 4 parcelas pode estender o resultado a 6 dígitos com
    // transportes em cadeia).
    const COL_LABELS = ['U', 'D', 'C', 'M', 'DM', 'CM'];

    function Slot({ value, state, isActive, onClick, size = 'large', ariaLabel }) {
      const stateClass = {
        empty: 'slot-empty',
        pending: 'slot-active',
        correct: 'slot-correct',
        wrong: 'slot-wrong anim-shake',
        revealed: 'slot-revealed',
      }[state] || 'slot-empty';

      const activeClass = isActive ? 'anim-pulse' : '';

      // Slot grande: rectângulo manuscrito 56x56 (resultado).
      // Slot pequeno (transporte): círculo 36x36 — é só um apontamento de
      // lembrete por cima da coluna, não tem o peso dos algarismos da conta.
      // Hit area transparente de 56x56 garante alvo táctil para criança.
      const isSmall = size !== 'large';
      const dim = isSmall
        ? { w: 36, h: 36, fz: 16, br: '50%' }
        : { w: 56, h: 56, fz: 32, br: '12px 8px 14px 10px' };

      const slot = (
        <div
          role="button"
          tabIndex={0}
          aria-label={ariaLabel}
          onClick={onClick}
          onKeyDown={(e) => { if (e.key === 'Enter') onClick && onClick(); }}
          className={`handwritten flex items-center justify-center ${stateClass} ${activeClass}`}
          style={{
            width: dim.w,
            height: dim.h,
            fontSize: dim.fz,
            borderRadius: dim.br,
            cursor: state === 'correct' || state === 'revealed' ? 'default' : 'pointer',
            userSelect: 'none',
          }}
        >
          {value === null || value === undefined ? '' : (
            <span key={`v-${state}-${value}`} className="anim-pencil" style={{ display: 'inline-block', lineHeight: 1.2 }}>
              {value}
            </span>
          )}
        </div>
      );

      if (isSmall) {
        return (
          <div className="slot-hit-area" onClick={onClick}>{slot}</div>
        );
      }
      return slot;
    }

    const COL_NAMES = ['unidades', 'dezenas', 'centenas', 'milhares'];

    function Tabela({ exercise, level, inputs, slotStates, activeSlot, onSlotClick }) {
      if (!exercise) return null;
      const numCols = exercise.expected.results.length;
      const colsRender = Array.from({ length: numCols }, (_, i) => numCols - 1 - i);

      function slotKey(type, col) { return `${type}-${col}`; }
      function getSlotState(type, col) { return slotStates[slotKey(type, col)] || 'empty'; }
      function isActive(type, col) { return activeSlot && activeSlot.type === type && activeSlot.col === col; }
      function getValue(type, col) {
        if (type === 'result') return inputs.results[col] !== undefined ? inputs.results[col] : null;
        return inputs.carries[col] !== undefined ? inputs.carries[col] : null;
      }

      // Barras verticais interiores: numCols-1 separadores entre as colunas
      // (i = 1..numCols-1). Posição em x usa a mesma fórmula do CSS grid:
      // a primeira coluna (40px) é a label do "+", as restantes têm largura
      // (100% - 40px) / numCols.
      const tilts = ['tilt-a', 'tilt-b', 'tilt-c', 'tilt-a'];
      const dividers = Array.from({ length: numCols - 1 }, (_, i) => {
        const pos = i + 1; // 1..numCols-1
        return (
          <div
            key={`div-${i}`}
            className={`col-divider ${tilts[i % tilts.length]}`}
            style={{ left: `calc(40px + ${pos} * (100% - 40px) / ${numCols})` }}
          />
        );
      });

      // Título manuscrito da conta a fazer, em formato horizontal — para o
      // jogador ler primeiro a operação completa antes de a desmontar nas
      // colunas. Usa as parcelas geradas; "= ?" enquanto não está resolvido.
      const exerciseTitle = exercise.parcelas.join(' + ') + ' = ?';

      // Largura mínima da tabela escala com o número de colunas, para os
      // slots de resultado (56px) terem sempre pelo menos ~16px de ar entre
      // si. Sem isto, a partir de 4 colunas os slots ficavam colados.
      // Fórmula: padding (48) + label "+" (40) + numCols × largura mínima
      // por coluna (72 = slot 56 + 16 de ar).
      const minTableWidth = Math.max(320, 48 + 40 + numCols * 72);

      return (
        <div className="paper-card p-6" style={{ background: 'rgba(255, 255, 245, 0.92)', minWidth: minTableWidth }}>
          <p
            className="handwritten text-center m-0 mb-4"
            style={{ fontSize: 28, color: 'var(--ink-secondary)', letterSpacing: '0.02em' }}
            aria-label={`A conta é ${exercise.parcelas.join(' mais ')} igual a quanto`}
          >
            {exerciseTitle}
          </p>
          <div className="table-grid" style={{ paddingRight: 0 }}>
            {dividers}

            <div className="grid mb-2" style={{ gridTemplateColumns: `40px repeat(${numCols}, 1fr)`, columnGap: 0, rowGap: '0.5rem' }}>
              <div></div>
              {colsRender.map(idx => (
                <div key={idx} className="text-center handwritten text-xl" style={{ color: 'var(--ink-secondary)' }}>
                  {COL_LABELS[idx] || '?'}
                </div>
              ))}
            </div>

            <div className="grid mb-2" style={{ gridTemplateColumns: `40px repeat(${numCols}, 1fr)`, columnGap: 0, rowGap: '0.5rem' }}>
              <div></div>
              {colsRender.map(idx => {
                if (idx === 0) return <div key={idx} />;
                return (
                  <div key={idx} className="flex justify-center">
                    <Slot
                      value={getValue('carry', idx)}
                      state={getSlotState('carry', idx)}
                      isActive={isActive('carry', idx)}
                      onClick={() => onSlotClick && onSlotClick('carry', idx)}
                      size="small"
                      ariaLabel={`Transporte para a coluna das ${COL_NAMES[idx] || ''}`}
                    />
                  </div>
                );
              })}
            </div>

            <div className="row-divider" aria-hidden="true" />

            {exercise.parcelas.map((p, parcelaIdx) => {
              const padded = String(p).padStart(numCols, ' ');
              const tiltClass = parcelaIdx % 2 === 0 ? '' : 'tilt-h-b';
              return (

    function LearnGame({ profile, onUpdateProfile, onBackToMenu, onSwitchProfile, onDeleteProfile }) {
      const [persisted, setPersisted] = useState(profile.somas);
      const level = persisted.level;
      const streak = persisted.streak;
      const points = persisted.points;
      const levelConfig = LEVELS[level - 1];
      const mode = levelConfig.mode;
      const [pointsBurst, setPointsBurst] = useState(null);

      const [exercise, setExercise] = useState(() => generateExercise(levelConfig));
      const numCols = exercise.expected.results.length;

      const [inputs, setInputs] = useState({ results: [], carries: [] });
      const [slotStates, setSlotStates] = useState({});
      const [activeSlot, setActiveSlot] = useState({ type: 'result', col: 0 });
      const [attempts, setAttempts] = useState({});
      const [hint, setHint] = useState(null);
      const [exerciseDirty, setExerciseDirty] = useState(false);
      const [mascoteState, setMascoteState] = useState('idle');
      const [completeModalOpen, setCompleteModalOpen] = useState(false);
      const [levelUpOpen, setLevelUpOpen] = useState(false);
      const [levelUpReason, setLevelUpReason] = useState('streak');
      const [parentalOpen, setParentalOpen] = useState(false);

      function slotKey(type, col) { return `${type}-${col}`; }

      function writeSlotValue(prev, slot, v) {
        const next = { results: [...prev.results], carries: [...prev.carries] };
        if (slot.type === 'result') next.results[slot.col] = v;
        else next.carries[slot.col] = v;
        return next;
      }

      function clearSlot(prev, slot) {
        const next = { results: [...prev.results], carries: [...prev.carries] };
        if (slot.type === 'result') next.results[slot.col] = null;
        else next.carries[slot.col] = null;
        return next;
      }

      function getMustFillSlotKeys() {
        const keys = [];
        for (let col = 0; col < numCols; col++) {
          keys.push(slotKey('result', col));
        }
        return keys;
      }

      function getAllValidatableKeys() {
        const keys = [];
        for (let col = 0; col < numCols; col++) {
          keys.push(slotKey('result', col));
          if (col >= 1) keys.push(slotKey('carry', col));
        }
        return keys;
      }

      function allSlotsFilled() {
        return getMustFillSlotKeys().every(k => {
          const [type, colStr] = k.split('-');
          const col = parseInt(colStr, 10);
          const v = type === 'result' ? inputs.results[col] : inputs.carries[col];
          return v !== null && v !== undefined;
        });
      }

      function autoAdvanceFocus(current) {
        const all = getAllValidatableKeys();
        const currentKey = slotKey(current.type, current.col);
        const idx = all.indexOf(currentKey);
        if (idx < 0 || idx >= all.length - 1) return null;
        const [type, colStr] = all[idx + 1].split('-');
        return { type, col: parseInt(colStr, 10) };
      }

      function startNewExercise(newLevel = level) {
        const cfg = LEVELS[newLevel - 1];
        const ex = generateExercise(cfg);
        setExercise(ex);
        setInputs({ results: [], carries: [] });
        setSlotStates({});
        setAttempts({});
        setHint(null);
        setExerciseDirty(false);
        setMascoteState('idle');
        setCompleteModalOpen(false);
        setActiveSlot({ type: 'result', col: 0 });
      }

      function completeExercise() {
        const firstTry = !exerciseDirty;
        const earned = computePointsForExercise(firstTry);
        setMascoteState('celebrating');
        const newStreak = firstTry ? streak + 1 : 0;
        const newPoints = persisted.points + earned;
        const newPointsSinceLastUp = (persisted.pointsSinceLastLevelUp || 0) + earned;
        const newPersisted = {
          ...persisted,
          streak: newStreak,
          points: newPoints,
          pointsSinceLastLevelUp: newPointsSinceLastUp,
          totalAttempts: persisted.totalAttempts + 1,
          totalCorrectFirstTry: persisted.totalCorrectFirstTry + (firstTry ? 1 : 0),
        };
        setPersisted(newPersisted);
        onUpdateProfile({ ...profile, somas: newPersisted });
        setPointsBurst(earned);
        setTimeout(() => setPointsBurst(null), 900);
        setCompleteModalOpen(true);

        // Subida natural por streak
        if (newStreak >= 5 && level < 12) {
          setLevelUpReason('streak');
          setTimeout(() => {
            setCompleteModalOpen(false);
            setLevelUpOpen(true);
          }, 1500);
          return;
        }
        // Subida por acumulação de pontos (apenas se não disparou já por streak)
        if (newPointsSinceLastUp >= ContasLogic.POINTS_TO_LEVELUP && level < 12) {
          setLevelUpReason('points');
          setTimeout(() => {
            setCompleteModalOpen(false);
            setLevelUpOpen(true);
          }, 1500);
        }
      }

      function handleNumpadPress(v) {
        if (!activeSlot || completeModalOpen || levelUpOpen || parentalOpen) return;

        if (mode === 'fim') {
          if (v === 'erase') {
            const key = slotKey(activeSlot.type, activeSlot.col);
            if (slotStates[key] === 'correct') return;
            setInputs(prev => clearSlot(prev, activeSlot));
            setSlotStates(prev => ({ ...prev, [key]: 'empty' }));
            return;
          }
          setInputs(prev => writeSlotValue(prev, activeSlot, v));
          const key = slotKey(activeSlot.type, activeSlot.col);
          setSlotStates(prev => ({ ...prev, [key]: 'pending' }));
          const next = autoAdvanceFocus(activeSlot);
          if (next) setActiveSlot(next);
          return;
        }

        // Modo "col": validação imediata
        if (v === 'erase') {
          const key = slotKey(activeSlot.type, activeSlot.col);
          if (slotStates[key] === 'correct') return;
          setInputs(prev => clearSlot(prev, activeSlot));
          setSlotStates(prev => ({ ...prev, [key]: 'empty' }));
          return;
        }

        const expectedValue = activeSlot.type === 'result'
          ? exercise.expected.results[activeSlot.col]
          : (exercise.expected.carries[activeSlot.col - 1] || 0);

        const result = validateSlot(v, expectedValue);
        const key = slotKey(activeSlot.type, activeSlot.col);

        setInputs(prev => writeSlotValue(prev, activeSlot, v));

        if (result.ok) {
          setSlotStates(prev => ({ ...prev, [key]: 'correct' }));
          setHint(null);
          setMascoteState('happy');
          const next = nextActiveSlotCol(activeSlot, exercise.expected, numCols);
          if (next) {
            setTimeout(() => setMascoteState('idle'), 600);
            setTimeout(() => setActiveSlot(next), 300);
          } else {
            setTimeout(() => completeExercise(), 500);
          }
        } else {
          setSlotStates(prev => ({ ...prev, [key]: 'wrong' }));
          setMascoteState('worried');
          setExerciseDirty(true);
          const currentAttempts = (attempts[key] || 0) + 1;
          setAttempts(prev => ({ ...prev, [key]: currentAttempts }));

          if (currentAttempts >= 3) {
            setTimeout(() => {
              setInputs(prev => writeSlotValue(prev, activeSlot, expectedValue));
              setSlotStates(prev => ({ ...prev, [key]: 'revealed' }));
              setHint({ kind: 'reveal', text: `Era um ${expectedValue}. Vamos seguir!` });
              setTimeout(() => {
                const next = nextActiveSlotCol(activeSlot, exercise.expected, numCols);
                if (next) {
                  setActiveSlot(next);
                  setHint(null);
                  setMascoteState('idle');
                } else {
                  completeExercise();
                }
              }, 1500);
            }, 500);
          } else {
            setHint(buildHintForError(activeSlot, exercise, currentAttempts));
            setTimeout(() => {
              setInputs(prev => clearSlot(prev, activeSlot));
              setSlotStates(prev => ({ ...prev, [key]: 'empty' }));
              setMascoteState('thinking');
              setTimeout(() => setMascoteState('idle'), 800);
            }, 500);
          }
        }
      }

      function handleVerificar() {
        if (mode !== 'fim') return;
        const allKeys = getAllValidatableKeys();
        const newSlotStates = { ...slotStates };
        const newAttempts = { ...attempts };
        let allOk = true;

        allKeys.forEach(k => {
          const [type, colStr] = k.split('-');
          const col = parseInt(colStr, 10);
          const userValRaw = type === 'result' ? inputs.results[col] : inputs.carries[col];
          const userEmpty = (userValRaw === null || userValRaw === undefined);
          const valForCheck = (type === 'carry' && userEmpty) ? 0 : userValRaw;
          const expectedVal = type === 'result' ? exercise.expected.results[col] : exercise.expected.carries[col - 1];
          const r = validateSlot(valForCheck, expectedVal);
          if (r.ok) {
            if (!(type === 'carry' && userEmpty)) {
              newSlotStates[k] = 'correct';
            }
          } else {
            newSlotStates[k] = 'wrong';
            allOk = false;
            newAttempts[k] = (newAttempts[k] || 0) + 1;
          }
        });

        setSlotStates(newSlotStates);
        setAttempts(newAttempts);

        if (allOk) {
          setMascoteState('celebrating');
          setTimeout(() => completeExercise(), 600);
          return;
        }

        setExerciseDirty(true);
        setMascoteState('worried');
        const maxAttempts = Math.max(...Object.values(newAttempts).filter(n => typeof n === 'number'));

        if (maxAttempts >= 3) {
          const reveals = { results: [...inputs.results], carries: [...inputs.carries] };
          const finalStates = { ...newSlotStates };
          allKeys.forEach(k => {
            if (newSlotStates[k] === 'wrong') {
              const [type, colStr] = k.split('-');
              const col = parseInt(colStr, 10);
              const expectedVal = type === 'result' ? exercise.expected.results[col] : exercise.expected.carries[col - 1];
              if (type === 'result') reveals.results[col] = expectedVal;
              else reveals.carries[col] = expectedVal;
              finalStates[k] = 'revealed';
            }
          });
          setInputs(reveals);
          setSlotStates(finalStates);
          setHint({ kind: 'reveal', text: 'Estavam quase! Vê os algarismos a laranja e segue.' });
          setTimeout(() => completeExercise(), 2500);
        } else {
          setHint({
            kind: maxAttempts === 1 ? 'soft' : 'specific',
            text: maxAttempts === 1
              ? 'Quase! Olha bem nas colunas marcadas a vermelho.'
              : 'Confere coluna a coluna — alguma soma não bate certo.',
          });
          setTimeout(() => {
            const cleared = { results: [...inputs.results], carries: [...inputs.carries] };
            const cleaning = { ...newSlotStates };
            allKeys.forEach(k => {
              if (newSlotStates[k] === 'wrong') {
                const [type, colStr] = k.split('-');
                const col = parseInt(colStr, 10);
                if (type === 'result') cleared.results[col] = null;
                else cleared.carries[col] = null;
                cleaning[k] = 'empty';
              }
            });
            setInputs(cleared);
            setSlotStates(cleaning);
            setMascoteState('thinking');
            setTimeout(() => setMascoteState('idle'), 800);
          }, 1200);
        }
      }

      function handleNext() {
        setCompleteModalOpen(false);
        startNewExercise();
      }

      function handleSlotClick(type, col) {
        if (mode === 'col') return;
        setActiveSlot({ type, col });
      }

      function handleSetLevel(newLevel) {
        const safe = Math.max(1, Math.min(persisted.maxLevelReached || 1, newLevel));
        const next = { ...persisted, level: safe, streak: 0 };
        setPersisted(next);
        onUpdateProfile({ ...profile, somas: next });
        startNewExercise(safe);
      }

      function handleAcceptLevelUp() {
        const newLevel = Math.min(12, level + 1);
        const newPersisted = {
          ...persisted,
          level: newLevel,
          maxLevelReached: Math.max(persisted.maxLevelReached || 1, newLevel),
          streak: 0,
          pointsSinceLastLevelUp: 0,
        };
        setPersisted(newPersisted);
        onUpdateProfile({ ...profile, somas: newPersisted });
        setLevelUpOpen(false);
        startNewExercise(newLevel);
      }

      function handleDeclineLevelUp() {
        const newPersisted = {
          ...persisted,
          streak: 0,
          pointsSinceLastLevelUp: 0,
        };
        setPersisted(newPersisted);
        onUpdateProfile({ ...profile, somas: newPersisted });
        setLevelUpOpen(false);
        startNewExercise();
      }

      return (
        <div className="min-h-screen flex flex-col items-center p-4">
          <div style={{ display: 'flex', alignItems: 'center', width: '100%', maxWidth: '72rem', marginBottom: 4 }}>
            <button
              onClick={onBackToMenu}
              title="Voltar ao menu"
              style={{ background: 'transparent', border: '1.5px solid var(--magic-gold)', borderRadius: 8, padding: '8px 14px', fontFamily: 'Caveat, cursive', fontSize: 20, cursor: 'pointer', color: 'var(--ink-primary)', minHeight: 56, marginRight: 8 }}
            >⌂</button>
            <div style={{ flex: 1 }}>
              <Header
                level={level}
                points={points}
                mascoteState={mascoteState}
                pointsBurst={pointsBurst}
                onOpenParental={() => setParentalOpen(true)}
              />
            </div>
          </div>

          <div className="flex flex-row items-start justify-center gap-8 flex-wrap my-2 w-full max-w-5xl">
            <Tabela
              exercise={exercise}
              level={level}
              inputs={inputs}
              slotStates={slotStates}
              activeSlot={activeSlot}
              onSlotClick={handleSlotClick}
            />

            <div className="flex flex-col items-center gap-3">
              <Numpad onPress={handleNumpadPress} disabled={completeModalOpen || levelUpOpen || parentalOpen} />
              {mode === 'fim' && (
                <VerificarButton
                  onClick={handleVerificar}
                  visible={allSlotsFilled() && !completeModalOpen}
                />
              )}
              <FeedbackHint hint={hint} />
            </div>
          </div>

          <ExerciseCompleteModal open={completeModalOpen} firstTry={!exerciseDirty} pointsEarned={pointsBurst} onNext={handleNext} />
          <LevelUpModal open={levelUpOpen} nextLevel={level + 1} reason={levelUpReason} onAccept={handleAcceptLevelUp} onDecline={handleDeclineLevelUp} />
          <ParentalPanel
            open={parentalOpen}
            level={level}
            maxLevel={persisted.maxLevelReached}
            onSetLevel={handleSetLevel}
            onClose={() => setParentalOpen(false)}
            onSwitchProfile={onSwitchProfile}
            onDeleteProfile={onDeleteProfile}
          />
        </div>
      );
    }

    function ExerciseBoard({ taLevel, onCorrect }) {
      const cfg = ContasLogic.LEVELS[taLevel - 1];
      const [exercise, setExercise] = useState(() => ContasLogic.generateExercise(cfg));
      const numCols = exercise.expected.results.length;
      const [inputs, setInputs] = useState({ results: [], carries: [] });
      const [slotStates, setSlotStates] = useState({});
      const [activeSlot, setActiveSlot] = useState({ type: 'result', col: 0 });
      const [dirty, setDirty] = useState(false);
      const [mascoteState, setMascoteState] = useState('idle');

      useEffect(() => {
        const cfg2 = ContasLogic.LEVELS[taLevel - 1];
        setExercise(ContasLogic.generateExercise(cfg2));
        setInputs({ results: [], carries: [] });
        setSlotStates({});
        setActiveSlot({ type: 'result', col: 0 });
        setDirty(false);
        setMascoteState('idle');
      }, [taLevel]);

      function slotKey(type, col) { return `${type}-${col}`; }

      function writeSlotValue(prev, slot, v) {
        const next = { results: [...prev.results], carries: [...prev.carries] };
        if (slot.type === 'result') next.results[slot.col] = v;
        else next.carries[slot.col] = v;
        return next;
      }

      function clearSlot(prev, slot) {
        const next = { results: [...prev.results], carries: [...prev.carries] };
        if (slot.type === 'result') next.results[slot.col] = null;
        else next.carries[slot.col] = null;
        return next;
      }

      function handleNumpadPress(v) {
        if (v === 'erase') {
          const key = slotKey(activeSlot.type, activeSlot.col);
          if (slotStates[key] === 'correct') return;
          setInputs(prev => clearSlot(prev, activeSlot));
          setSlotStates(prev => ({ ...prev, [key]: 'empty' }));
          return;
        }

        const key = slotKey(activeSlot.type, activeSlot.col);
        if (slotStates[key] === 'correct') return;

        const expectedValue = activeSlot.type === 'result'
          ? exercise.expected.results[activeSlot.col]
          : (exercise.expected.carries[activeSlot.col - 1] || 0);

        const result = ContasLogic.validateSlot(v, expectedValue);
        setInputs(prev => writeSlotValue(prev, activeSlot, v));

        if (result.ok) {
          const newStates = { ...slotStates, [key]: 'correct' };
          setSlotStates(newStates);
          setMascoteState('happy');
          const next = nextActiveSlotCol(activeSlot, exercise.expected, numCols);
          if (next) {
            setTimeout(() => setMascoteState('idle'), 600);
            setTimeout(() => setActiveSlot(next), 300);
          } else {
            const firstTry = !dirty;
            setTimeout(() => {
              setMascoteState('idle');
              onCorrect(firstTry);
            }, 500);
          }
        } else {
          setSlotStates(prev => ({ ...prev, [key]: 'wrong' }));
          setMascoteState('worried');
          setDirty(true);
          setTimeout(() => {
            setInputs(prev => clearSlot(prev, activeSlot));
            setSlotStates(prev => ({ ...prev, [key]: 'empty' }));
            setMascoteState('idle');
          }, 500);
        }
      }

      function handleSlotClick(type, col) {
        // No Time Attack (always 'col' mode): slots are auto-advanced; click only
        // allows revisiting empty/wrong slots.
        const key = slotKey(type, col);
        if (slotStates[key] === 'correct') return;
        setActiveSlot({ type, col });
      }

      return (
        <div className="flex flex-row items-start justify-center gap-8 flex-wrap my-2 w-full max-w-5xl">
          <Tabela
            exercise={exercise}
            level={taLevel}
            inputs={inputs}
            slotStates={slotStates}
            activeSlot={activeSlot}
            onSlotClick={handleSlotClick}
          />
          <div className="flex flex-col items-center gap-3">
            <Mascote state={mascoteState} />
            <Numpad onPress={handleNumpadPress} disabled={false} />
          </div>
        </div>
      );
    }

    function TimeAttackGame({ profile, onFinish, onAbort }) {
      const [timeLeft, setTimeLeft] = useState(ContasLogic.TIME_ATTACK_DURATION_S);
      const [taLevel, setTaLevel] = useState(1);
      const [hitsAtLevel, setHitsAtLevel] = useState(0);
      const [taPoints, setTaPoints] = useState(0);
      const [taExercises, setTaExercises] = useState(0);
      const [taFirstTryHits, setTaFirstTryHits] = useState(0);
      const [taMaxLevel, setTaMaxLevel] = useState(1);
      const [exerciseKey, setExerciseKey] = useState(0);

      // Use refs for the latest values that the timeout-on-end callback should see.
      const finishedRef = useRef(false);

      useEffect(() => {
        if (timeLeft <= 0) {
          if (!finishedRef.current) {
            finishedRef.current = true;
            onFinish({
              points: taPoints,
              exercises: taExercises,
              firstTryHits: taFirstTryHits,
              maxLevel: taMaxLevel,
            });
          }
          return;
        }
        const id = setTimeout(() => setTimeLeft(t => t - 1), 1000);
        return () => clearTimeout(id);
      }, [timeLeft]);

      function fmtTime(s) {
        const m = Math.floor(s / 60);
        const ss = s % 60;
        return `${m}:${ss < 10 ? '0' : ''}${ss}`;
      }

      const timeClass = timeLeft <= 10 ? 'ta-time crit' : (timeLeft <= 30 ? 'ta-time warn' : 'ta-time');

      function handleAbortClick() {
        if (typeof window !== 'undefined' && window.confirm('Sair? Vais perder os pontos desta partida.')) {
          finishedRef.current = true;
          onAbort();
        }
      }

      return (
        <div className="ta-shell">
          <div className="ta-header">
            <div className="left">
              <span className="ta-name">{profile.avatar} {profile.name}</span>
              <span className="ta-level">Nível {taLevel}</span>
              <span className="ta-points">{taPoints} ✨</span>
            </div>
            <div className={timeClass} aria-label={`Tempo restante: ${fmtTime(timeLeft)}`}>{fmtTime(timeLeft)}</div>
          </div>
          <ExerciseBoard
            key={exerciseKey}
            taLevel={taLevel}
            onCorrect={(firstTry) => {
              setExerciseKey(k => k + 1);
              const earned = ContasLogic.pointsForLevel(taLevel, firstTry);
              setTaPoints(p => p + earned);
              setTaExercises(e => e + 1);
              if (firstTry) {
                setTaFirstTryHits(h => h + 1);
                const ramp = ContasLogic.nextLevelInRamp(taLevel, hitsAtLevel);
                setTaLevel(ramp.level);
                setHitsAtLevel(ramp.hitsAtLevel);
                if (ramp.leveledUp) {
                  setTaMaxLevel(m => Math.max(m, ramp.level));
                }
              }
            }}
          />
          <div style={{ textAlign: 'center', marginTop: 12 }}>
            <button onClick={handleAbortClick}
              style={{ background: 'transparent', border: '1px solid var(--bronze)', borderRadius: 8, padding: '8px 14px', fontFamily: 'Caveat, cursive', fontSize: 16, cursor: 'pointer', minHeight: 48, color: 'var(--ink-warm)' }}
            >Sair</button>
          </div>
        </div>
      );
    }

    function endScreenMessage({ stats, leaderboard, profileName }) {
      // Encontrar a entry deste jogador com estes pontos (a recém-inserida)
      const myCurrent = leaderboard.find(
        e => e.profileName.toLowerCase() === profileName.toLowerCase()
          && e.points === stats.points && e.exercises === stats.exercises
      );
      const myRank = myCurrent ? leaderboard.indexOf(myCurrent) + 1 : 0;
      const isFirst = myRank === 1;

      // Recorde pessoal: maior pontuação anterior do mesmo jogador (excluindo a actual)
      const previousMine = leaderboard
        .filter(e => e.profileName.toLowerCase() === profileName.toLowerCase() && e !== myCurrent)
        .map(e => e.points);
      const previousBest = previousMine.length ? Math.max(...previousMine) : 0;
      const isNewPersonalRecord = stats.points > previousBest;

      // Empate em pontos
      const tied = leaderboard.filter(
        e => e.points === stats.points && e.profileName.toLowerCase() !== profileName.toLowerCase()
      );

      // Próximo acima
      const above = leaderboard.find(e => e.points > stats.points);

      if (isFirst && isNewPersonalRecord) return 'Boa! Estás no topo do Mural!';
      if (isFirst && !isNewPersonalRecord) return '1.º lugar! Já o tinhas feito melhor — agora repete a façanha!';
      if (isNewPersonalRecord && above) return `Novo recorde pessoal! Estás a ${above.points - stats.points} pts do/a ${above.profileName} — quase!`;
      if (tied.length > 0) return `Empataste com o/a ${tied[0].profileName}!`;
      if (leaderboard.length <= 1) return 'Boa, primeiro jogo! Já estás no Mural.';
      return `Boa, ${stats.points} pontos! Da próxima já vais fazer mais.`;
    }

    function fmtLBDate(iso) {
      // ISO YYYY-MM-DD → "DD mmm" pt-PT (curto)
      if (!iso) return '';
      const months = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
      const parts = String(iso).split('-');
      if (parts.length < 3) return iso;
      const y = parseInt(parts[0], 10);
      const m = parseInt(parts[1], 10);
      const d = parseInt(parts[2], 10);
      if (!m || !d || m < 1 || m > 12) return iso;
      return `${d} ${months[m - 1]}`;
    }
