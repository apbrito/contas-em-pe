                <div className="base">1</div>
              </div>
              <div className="lb-step third">
                <div className="lb-medal">🥉</div>
                <div className="ava">{top3[2].avatar}</div>
                <div className="nm">{top3[2].profileName}</div>
                <div className="pts">{top3[2].points} ✨</div>
                <div className="base">3</div>
              </div>
            </div>
          )}

          {!hasFullPodium && top3.length > 0 && (
            <div className="lb-list">
              {top3.map((e, i) => (
                <div key={i} className={`lb-row ${isCurrent(e) ? 'me' : ''}`}>
                  <div className="pos">{i + 1}</div>
                  <div className="who">
                    <span className="ava-emoji">{e.avatar}</span>
                    <span className="nm">{e.profileName}</span>
                    <span className="date">· {fmtLBDate(e.date)}</span>
                  </div>
                  <div className="pts">{e.points} ✨</div>
                </div>
              ))}
            </div>
          )}

          {rest.length > 0 && (
            <div className="lb-list">
              {rest.map((e, i) => (
                <div key={i + 3} className={`lb-row ${isCurrent(e) ? 'me' : ''}`}>
                  <div className="pos">{i + 4}</div>
                  <div className="who">
                    <span className="ava-emoji">{e.avatar}</span>
                    <span className="nm">{e.profileName}</span>
                    <span className="date">· {fmtLBDate(e.date)}</span>
                  </div>
                  <div className="pts">{e.points} ✨</div>
                </div>
              ))}
            </div>
          )}

          {leaderboard.length === 0 && (
            <div className="lb-empty">O Mural está vazio. Sê o/a primeiro/a!</div>
          )}

          <div className="lb-btn-row">
            <button onClick={onBack}
              style={{ background: 'transparent', border: '1.5px solid var(--bronze)', borderRadius: 10, padding: '12px 18px', fontFamily: 'Caveat, cursive', fontSize: 18, cursor: 'pointer', color: 'var(--ink-warm)', minHeight: 56 }}
            >← Voltar</button>
            <button onClick={onPlay}
              style={{ background: 'var(--burgundy)', color: 'var(--paper-cream)', border: '2px solid var(--burgundy)', padding: '12px 18px', borderRadius: 10, fontFamily: 'Caveat, cursive', fontSize: 18, cursor: 'pointer', boxShadow: '2px 3px 0 rgba(128,0,32,0.18)', minHeight: 56 }}
            >⏱ Jogar contra-relógio</button>
          </div>
        </div>
      );
    }

    function App() {
      const initialState = useRef(loadState()).current;
      const [appState, setAppState] = useState(initialState);
      const [currentScreen, setCurrentScreen] = useState(
        getActiveProfile(initialState) ? 'main-menu' : 'first-profile'
      );
      const [lastSessionStats, setLastSessionStats] = useState(null);

      function persistState(newState) {
        setAppState(newState);
        saveState(newState);
      }

      function updateProfile(profile) {
        const next = {
          ...appState,
          profiles: { ...appState.profiles, [profile.name]: profile },
        };
        persistState(next);
      }

      function handleCreateProfile(name, avatar) {
        const r = createProfile(appState, name, avatar);
        if (!r.ok) return;
        persistState(r.state);
        setCurrentScreen('main-menu');
      }

      function handleSwitchProfile(targetName) {
        const r = setActiveProfile(appState, targetName);
        if (r.ok) persistState(r.state);
      }

      const activeProfile = getActiveProfile(appState);
      const existingNames = Object.keys(appState.profiles || {});
      const profileLimitReached = existingNames.length >= MAX_PROFILES;

      // Defesa: se não há perfis mas estamos noutro ecrã, força first-profile.
      if (!activeProfile && currentScreen !== 'first-profile' && currentScreen !== 'create-profile') {
        setCurrentScreen('first-profile');
        return null;
      }

      let screen;
      switch (currentScreen) {
        case 'first-profile':
          screen = (
            <ProfileCreate
              existingNames={existingNames}
              onCreate={handleCreateProfile}
              profileLimitReached={profileLimitReached}
              title="Olá! Vamos criar o teu cartão"
            />
          );
          break;
        case 'create-profile':
          screen = (
            <ProfileCreate
              existingNames={existingNames}
              onCreate={(name, avatar) => {
                const r = ContasLogic.createProfile(appState, name, avatar);
                if (!r.ok) return;
                const switched = { ...r.state, lastProfile: r.profile.name };
                persistState(switched);
                setCurrentScreen('main-menu');
              }}
              onCancel={() => setCurrentScreen('main-menu')}
              profileLimitReached={profileLimitReached}
            />
          );
          break;
        case 'switch-profile': {
          const profilesList = listProfiles(appState);
          screen = (
            <div style={{ maxWidth: 720, margin: '0 auto', padding: 20 }}>
              <div style={{ fontFamily: 'Caveat, cursive', fontSize: 28, color: 'var(--ink-warm)', textAlign: 'center', marginBottom: 16 }}>
                Quem vai jogar?
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(140px, 1fr))', gap: 10 }}>
                {profilesList.map(p => (
                  <div
                    key={p.name}
                    onClick={() => { handleSwitchProfile(p.name); setCurrentScreen('main-menu'); }}
                    style={{ background: 'var(--paper-cream)', border: '2px solid var(--bronze)', borderRadius: 12, padding: 12, textAlign: 'center', cursor: 'pointer', boxShadow: '2px 3px 0 rgba(0,0,0,0.10)', minHeight: 96 }}
                  >
                    <div style={{ fontSize: 28 }}>{p.avatar}</div>
                    <div style={{ fontFamily: 'Caveat, cursive', fontSize: 18 }}>{p.name}</div>
                    <div style={{ fontSize: 11, color: '#888' }}>Nível {p.somas.level}</div>
                  </div>
                ))}
                <div
                  onClick={() => setCurrentScreen('create-profile')}
                  style={{ background: 'transparent', border: '2px dashed var(--bronze)', borderRadius: 12, padding: 12, textAlign: 'center', cursor: 'pointer', color: 'var(--bronze)', minHeight: 96 }}
                  role="button" aria-label="Criar perfil novo"
                >
                  <div style={{ fontSize: 28 }}>+</div>
                  <div style={{ fontFamily: 'Caveat, cursive', fontSize: 16 }}>Criar novo</div>
                </div>
              </div>
              <button onClick={() => setCurrentScreen('main-menu')}
                style={{ background: 'transparent', border: '1.5px solid var(--bronze)', borderRadius: 8, padding: '10px 18px', marginTop: 16, fontFamily: 'Caveat, cursive', fontSize: 16, cursor: 'pointer', color: 'var(--ink-warm)', display: 'block', marginLeft: 'auto', marginRight: 'auto', minHeight: 48 }}
              >← Voltar</button>
            </div>
          );
          break;
        }
        case 'delete-profile-confirm':
          screen = activeProfile ? (
            <div style={{ maxWidth: 480, margin: '40px auto', padding: 20, background: 'var(--paper-cream)', border: '2px solid #b00020', borderRadius: 12, boxShadow: '2px 3px 0 rgba(0,0,0,0.10)' }}>
              <div style={{ fontFamily: 'Caveat, cursive', fontSize: 24, color: 'var(--ink-primary)' }}>
                Eliminar perfil "{activeProfile.name}"?
              </div>
              <p style={{ fontSize: 14, color: 'var(--ink-primary)', marginTop: 10, lineHeight: 1.4 }}>
                Esta acção não se pode desfazer. Os melhores tempos com este nome ficam no Mural dos Campeões.
              </p>
              <div style={{ display: 'flex', gap: 8, marginTop: 14, justifyContent: 'flex-end' }}>
                <button onClick={() => setCurrentScreen('main-menu')}
                  style={{ background: 'transparent', border: '1.5px solid var(--magic-gold)', borderRadius: 10, padding: '12px 18px', fontFamily: 'Caveat, cursive', fontSize: 18, cursor: 'pointer', color: 'var(--ink-primary)', minHeight: 56 }}
                >Cancelar</button>
                <button onClick={() => {
                  const r = ContasLogic.deleteProfile(appState, activeProfile.name);
                  if (r.ok) {
                    persistState(r.state);
                    const stillHaveProfiles = Object.keys(r.state.profiles).length > 0;
                    setCurrentScreen(stillHaveProfiles ? 'main-menu' : 'first-profile');
                  } else {
                    setCurrentScreen('main-menu');
                  }
                }}
                  style={{ background: '#b00020', color: 'var(--paper-cream)', border: 'none', borderRadius: 10, padding: '12px 18px', fontFamily: 'Caveat, cursive', fontSize: 18, cursor: 'pointer', minHeight: 56 }}
                >Eliminar</button>
              </div>
            </div>
          ) : (
            (() => { setCurrentScreen('main-menu'); return null; })()
          );
          break;
        case 'learn':
          screen = (
            <LearnGame
              profile={activeProfile}
              onUpdateProfile={updateProfile}
              onBackToMenu={() => setCurrentScreen('main-menu')}
              onSwitchProfile={() => setCurrentScreen('switch-profile')}
              onDeleteProfile={() => setCurrentScreen('delete-profile-confirm')}
            />
          );
          break;
        case 'parental-from-menu':
          screen = activeProfile ? (
            <div>
              <MainMenu
                profile={activeProfile}
                bestTime={(() => {
                  const lb = ContasLogic.getLeaderboard(appState, 'somas', 'tempo');
                  const mine = lb.find(e => e.profileName === activeProfile.name);
                  return mine ? mine.points : null;
                })()}
                onLearn={() => setCurrentScreen('learn')}
                onTimeAttack={() => setCurrentScreen('time-attack-lobby')}
                onSeeMural={() => setCurrentScreen('leaderboard')}
                onSwitchProfile={() => setCurrentScreen('switch-profile')}
                onOpenParental={() => {}}
              />
              <ParentalPanel
                open={true}
                level={activeProfile.somas.level}
                maxLevel={activeProfile.somas.maxLevelReached}
                onSetLevel={(newLevel) => {
                  const safe = Math.max(1, Math.min(activeProfile.somas.maxLevelReached || 1, newLevel));
                  updateProfile({ ...activeProfile, somas: { ...activeProfile.somas, level: safe, streak: 0 } });
                }}
                onClose={() => setCurrentScreen('main-menu')}
                onSwitchProfile={() => setCurrentScreen('switch-profile')}
                onDeleteProfile={() => setCurrentScreen('delete-profile-confirm')}
              />
            </div>
          ) : (
            (() => { setCurrentScreen('main-menu'); return null; })()
          );
          break;
        case 'time-attack-lobby': {
          const profilesList = ContasLogic.listProfiles(appState);
          const lb = ContasLogic.getLeaderboard(appState, 'somas', 'tempo');
          screen = (
            <TimeAttackLobby
              profiles={profilesList}
              leaderboard={lb}
              onSelectProfile={(name) => {
                handleSwitchProfile(name);
                setCurrentScreen('time-attack-game');
              }}
              onCreateNew={() => setCurrentScreen('create-profile-from-ta')}
              onSeeMural={() => setCurrentScreen('leaderboard')}
              onBack={() => setCurrentScreen('main-menu')}
            />
          );
          break;
        }
        case 'create-profile-from-ta':
          screen = (
            <ProfileCreate
              existingNames={existingNames}
              onCreate={(name, avatar) => {
                const r = ContasLogic.createProfile(appState, name, avatar);
                if (!r.ok) return;
                const switched = { ...r.state, lastProfile: r.profile.name };
                persistState(switched);
                setCurrentScreen('time-attack-game');
              }}
              onCancel={() => setCurrentScreen('time-attack-lobby')}
              profileLimitReached={profileLimitReached}
            />
          );
          break;
        case 'time-attack-game':
          screen = activeProfile ? (
            <TimeAttackGame
              profile={activeProfile}
              onFinish={(stats) => {
                if (stats.points > 0) {
                  const r = ContasLogic.addLeaderboardEntry(appState, 'somas', 'tempo', {
                    profileName: activeProfile.name,
                    avatar: activeProfile.avatar,
                    points: stats.points,
                    exercises: stats.exercises,
                    hitRateFirstTry: stats.exercises > 0 ? stats.firstTryHits / stats.exercises : 0,
                    maxLevelReached: stats.maxLevel,
                    date: ContasLogic.todayISO ? ContasLogic.todayISO() : new Date().toISOString().slice(0, 10),
                  });
                  if (r.ok) persistState(r.state);
                }
                setLastSessionStats({ ...stats, profile: activeProfile });
                setCurrentScreen('end-screen');
              }}
              onAbort={() => setCurrentScreen('main-menu')}
            />
          ) : (
            (() => { setCurrentScreen('main-menu'); return null; })()
          );
          break;
        case 'end-screen': {
          const stats = lastSessionStats;
          if (!stats) {
            setCurrentScreen('main-menu');
            screen = null;
            break;
          }
          const lb = ContasLogic.getLeaderboard(appState, 'somas', 'tempo');
          screen = (
            <EndScreen
              profile={stats.profile}
              stats={stats}
              leaderboard={lb}
              onPlayAgain={() => { setLastSessionStats(null); setCurrentScreen('time-attack-game'); }}
              onBackToMenu={() => { setLastSessionStats(null); setCurrentScreen('main-menu'); }}
              onSeeMural={() => setCurrentScreen('leaderboard')}
            />
          );
          break;
        }
        case 'leaderboard': {
          const lb = ContasLogic.getLeaderboard(appState, 'somas', 'tempo');
          screen = (
            <LeaderboardPage
              leaderboard={lb}
              currentProfileName={activeProfile ? activeProfile.name : null}
              onBack={() => setCurrentScreen('main-menu')}
              onPlay={() => setCurrentScreen('time-attack-lobby')}
            />
          );
          break;
        }
        case 'main-menu':
        default: {
          const lb = getLeaderboard(appState, 'somas', 'tempo');
          const mine = activeProfile ? lb.find(e => e.profileName === activeProfile.name) : null;
          screen = (
            <MainMenu
              profile={activeProfile}
              bestTime={mine ? mine.points : null}
              onLearn={() => setCurrentScreen('learn')}
              onTimeAttack={() => setCurrentScreen('time-attack-lobby')}
              onSeeMural={() => setCurrentScreen('leaderboard')}
              onSwitchProfile={() => setCurrentScreen('switch-profile')}
              onOpenParental={() => setCurrentScreen('parental-from-menu')}
            />
          );
          break;
        }
      }

      return (
        <div>
          {screen}
          <UpdateBanner currentScreen={currentScreen} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <!-- Registo do Service Worker para funcionar offline em tablet.
       Browsers exigem contexto seguro: http://localhost, http://127.0.0.1
       ou HTTPS. LAN HTTP simples (ex.: http://192.168.x.x) NÃO conta
       como secure — usar tools/serve_https.py no PC para servir via
       HTTPS para o tablet (ver README, secção "Instalar no tablet"). -->
  <script>
    let waitingSW = null;
    let updateBannerCallback = null;

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const reg = await navigator.serviceWorker.register('./service-worker.js');
          console.log('[SW] registado, scope:', reg.scope);

          reg.addEventListener('updatefound', () => {
            const newSW = reg.installing;
            if (!newSW) return;
            newSW.addEventListener('statechange', () => {
              if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                waitingSW = newSW;
                if (updateBannerCallback) updateBannerCallback(true);
              }
            });
          });

          // Fallback de 1h caso uma versão antiga em cache de logic.js
          // não exporte UPDATE_CHECK_INTERVAL_MS — evita setInterval com `undefined`,
          // que o browser coerce para ~0 e faz hammer de reg.update().
          const updateInterval = (typeof ContasLogic !== 'undefined' && typeof ContasLogic.UPDATE_CHECK_INTERVAL_MS === 'number')
            ? ContasLogic.UPDATE_CHECK_INTERVAL_MS
            : 60 * 60 * 1000;
          setInterval(() => reg.update().catch(() => {}), updateInterval);

          window.__matAppRegistration = reg;
        } catch (err) {
          console.warn('[SW] register falhou:', err);
        }
      });
    }
  </script>
</body>
